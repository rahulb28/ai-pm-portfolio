name: Daily PM Job Alert

on:
  schedule:
    - cron: '17 14 * * 1-5'   # 7:17 AM PDT (Mon–Fri)
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch jobs and send daily alert
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, urllib.parse, xml.etree.ElementTree as ET
          from datetime import datetime, timezone, timedelta
          from email.utils import parsedate_to_datetime

          PAC = timezone(timedelta(hours=-7))
          now = datetime.now(PAC)
          date_str = now.strftime('%A, %b %d %Y')
          time_str = now.strftime('%I:%M %p PDT')
          cutoff = datetime.now(timezone.utc) - timedelta(hours=36)  # 36h buffer for slow postings

          jobs = []
          seen_links = set()

          def add_job(title, company, link, source, date_str=""):
              if not link or link in seen_links:
                  return
              seen_links.add(link)
              jobs.append({"title": title, "company": company, "link": link, "source": source, "date": date_str})

          # ── Indeed RSS ───────────────────────────────────────────────────────
          def fetch_indeed(query, location="Seattle, WA", label="Indeed"):
              params = {"q": query, "l": location, "sort": "date", "fromage": "1", "limit": "15"}
              url = "https://www.indeed.com/rss?" + urllib.parse.urlencode(params)
              try:
                  req = urllib.request.Request(url, headers={
                      "User-Agent": "Mozilla/5.0 (compatible; Googlebot/2.1)"
                  })
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      content = resp.read()
                  root = ET.fromstring(content)
                  channel = root.find('channel')
                  if channel is None:
                      return
                  for item in channel.findall('item')[:8]:
                      title = (item.findtext('title') or '').strip()
                      link  = (item.findtext('link')  or '').strip()
                      pub   = (item.findtext('pubDate') or '')
                      # Extract company from title if pattern "Title - Company"
                      company = ""
                      if " - " in title:
                          parts = title.rsplit(" - ", 1)
                          title = parts[0].strip()
                          company = parts[1].strip()
                      try:
                          pub_dt = parsedate_to_datetime(pub)
                          if pub_dt.tzinfo is None:
                              pub_dt = pub_dt.replace(tzinfo=timezone.utc)
                          if pub_dt < cutoff:
                              continue
                      except Exception:
                          pass
                      add_job(title, company, link, label, pub[:16] if pub else "")
              except Exception as e:
                  print(f"  [Indeed] {label}: {e}")

          fetch_indeed("senior product manager machine learning",         "Seattle, WA",       "Indeed · Seattle")
          fetch_indeed("senior product manager AI LLM generative",        "Remote",            "Indeed · Remote AI/LLM")
          fetch_indeed("senior product manager adtech marketing bidding",  "Remote",            "Indeed · Remote AdTech")
          fetch_indeed("principal product manager ML platform data",       "Seattle, WA",       "Indeed · Seattle ML Platform")
          fetch_indeed("product manager ROAS campaign optimization",       "Remote",            "Indeed · Remote ROAS")
          fetch_indeed("group product manager machine learning advertising","United States",     "Indeed · US ML Ads")

          # ── Remotive (free API, no key needed) ───────────────────────────────
          def fetch_remotive(search, label="Remotive"):
              url = "https://remotive.com/api/remote-jobs?category=product&search=" + urllib.parse.quote(search) + "&limit=20"
              try:
                  with urllib.request.urlopen(url, timeout=20) as resp:
                      data = json.loads(resp.read())
                  for job in data.get("jobs", []):
                      pub = job.get("publication_date", "")
                      try:
                          pub_dt = datetime.fromisoformat(pub.replace("Z", "+00:00"))
                          if pub_dt < cutoff:
                              continue
                      except Exception:
                          pass
                      add_job(
                          job.get("title", ""),
                          job.get("company_name", ""),
                          job.get("url", ""),
                          label,
                          pub[:10] if pub else ""
                      )
              except Exception as e:
                  print(f"  [Remotive] {label}: {e}")

          fetch_remotive("product manager machine learning",  "Remotive · PM × ML")
          fetch_remotive("product manager AI LLM",           "Remotive · PM × AI/LLM")
          fetch_remotive("product manager data platform",    "Remotive · PM × Data Platform")

          # ── We Work Remotely RSS ─────────────────────────────────────────────
          def fetch_wwr(label="We Work Remotely"):
              url = "https://weworkremotely.com/categories/remote-management-and-finance-jobs.rss"
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      content = resp.read()
                  root = ET.fromstring(content)
                  ns = {'content': 'http://purl.org/rss/1.0/modules/content/'}
                  for item in root.findall('.//item')[:10]:
                      title   = (item.findtext('title') or '').strip()
                      link    = (item.findtext('link')  or '').strip()
                      pub     = (item.findtext('pubDate') or '')
                      company = ""
                      if ":" in title:
                          parts = title.split(":", 1)
                          company = parts[0].strip()
                          title   = parts[1].strip()
                      # filter PM roles only
                      if not any(k in title.lower() for k in ["product manager", "pm ", " pm"]):
                          continue
                      try:
                          pub_dt = parsedate_to_datetime(pub)
                          if pub_dt.tzinfo is None:
                              pub_dt = pub_dt.replace(tzinfo=timezone.utc)
                          if pub_dt < cutoff:
                              continue
                      except Exception:
                          pass
                      if link:
                          link = "https://weworkremotely.com" + link if link.startswith("/") else link
                      add_job(title, company, link, label, pub[:16] if pub else "")
              except Exception as e:
                  print(f"  [WWR] {e}")

          fetch_wwr()

          # ── Otta (free job board, no auth) ───────────────────────────────────
          # Otta doesn't have a public RSS — skip for now

          # ── Build email ─────────────────────────────────────────────────────
          divider = "─" * 60

          if jobs:
              body_lines = [
                  f"🎯 Daily PM Job Alert — {date_str}",
                  f"Found {len(jobs)} fresh postings (last 36h). Apply tonight! 🚀",
                  "",
                  divider,
              ]

              # Group by source
              sources = {}
              for j in jobs:
                  sources.setdefault(j["source"], []).append(j)

              for src, src_jobs in sources.items():
                  body_lines.append(f"\n📌 {src}  ({len(src_jobs)} jobs)")
                  body_lines.append("─" * 40)
                  for j in src_jobs:
                      body_lines.append(f"  🔹 {j['title']}")
                      if j["company"]:
                          body_lines.append(f"     Company : {j['company']}")
                      if j["date"]:
                          body_lines.append(f"     Posted  : {j['date']}")
                      body_lines.append(f"     Apply   → {j['link']}")
                      body_lines.append("")

              body_lines += [
                  divider,
                  "  🎯 YOUR STRONGEST KEYWORDS",
                  divider,
                  "✅ ML bidding · ROAS · AdTech · auction mechanics",
                  "✅ A/B experimentation · LLM / GenAI PM · marketing ML",
                  "✅ $500M+ ad spend · multi-agent AI · platform PM",
                  "",
                  "🏢 Target companies:",
                  "   Google · Meta · Amazon · Microsoft · Booking.com",
                  "   Airbnb · TripAdvisor · Uber · Criteo · The Trade Desk",
                  "   OpenAI · Cohere · Anthropic · Databricks · Snowflake",
                  "",
                  divider,
                  f"Sent at {time_str}  ·  rahulb28.github.io/ai-pm-portfolio",
                  divider,
              ]
          else:
              body_lines = [
                  f"🎯 Daily PM Job Alert — {date_str}",
                  "",
                  "No new PM jobs found in the last 36 hours across monitored sources.",
                  "This may be a slow day — check the search links below manually.",
                  "",
                  divider,
                  "Manual search links:",
                  "  LinkedIn: https://www.linkedin.com/jobs/search/?keywords=senior+product+manager+machine+learning&f_TPR=r86400",
                  "  Indeed:   https://www.indeed.com/jobs?q=senior+product+manager+AI&fromage=1",
                  divider,
                  f"Sent at {time_str}",
              ]

          message = "\n".join(body_lines)

          # ── Send via EmailJS ────────────────────────────────────────────────
          payload = {
              "service_id":  "service_zvlvojn",
              "template_id": "template_94956u9",
              "user_id":     "U14aXalSqzq7F0qpc",
              "accessToken": "ipcbTPz7PYwWZ3ESWa90w",
              "template_params": {
                  "page":    f"Daily PM Job Alert — {date_str} ({len(jobs)} jobs)",
                  "message": message
              }
          }

          req = urllib.request.Request(
              "https://api.emailjs.com/api/v1.0/email/send",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent":   "rahulb28-job-alert/1.0"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read().decode()
                  print(f"✅ Alert sent! {len(jobs)} jobs found. EmailJS {resp.status} · {body}")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"❌ EmailJS error {e.code}: {body}")
              raise SystemExit(1)

          PYEOF
